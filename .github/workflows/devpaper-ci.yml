# 云端回归：不表示多平台交付承诺，仅单 Job 跑 devpaper 单测。
name: devpaper CI

on:
  push:
    paths:
      - "devpaper/**"
      - ".github/workflows/devpaper-ci.yml"
  pull_request:
    paths:
      - "devpaper/**"
      - ".github/workflows/devpaper-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devpaper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: devpaper/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
